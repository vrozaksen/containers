---
# yaml-language-server: $schema=https://raw.githubusercontent.com/goss-org/goss/master/docs/schema.yaml
process:
  emby-server:
    running: true
    executable: "/opt/emby-server/bin/emby-server"
    args:
      - "--programdata"
      - "/config"

port:
  tcp6:8096:
    listening: true
    ip:
      - "::"

http:
  http://localhost:8096/System/Info/Public:
    status: 200
    timeout: 10000
    allow-insecure: true
    headers:
      - "Content-Type: application/json"
    body:
      - '"ServerName":'
      - '"Version":'

file:
  /etc/emby-server.conf:
    exists: true
    contents:
      - "EMBY_DATA=/config"
  /config:
    exists: true
    filetype: directory
    owner: "emby"
    group: "emby"
  /healthcheck.sh:
    exists: true
    mode: "0755"

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/goss-org/goss/master/docs/schema.yaml
process:
  emby-server:
    running: true

port:
  tcp:8096:
    listening: true

http:
  http://localhost:8096/System/Info/Public:
    status: 200
    allow-insecure: true
    headers:
      - "Content-Type: application/json"

file:
  /etc/emby-server.conf:
    exists: true
    contains:
      - "EMBY_DATA=/config"
  /config:
    exists: true
    filetype: directory
    owner: "emby"
    group: "emby"
  /healthcheck.sh:
    exists: true
    mode: "0755"

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/goss-org/goss/master/docs/schema.yaml
process:
  emby-server:
    running: true

port:
  tcp:8096:
    listening: true
    ip:
      - "0.0.0.0"
      - "::"

http:
  http://localhost:8096/health:
    status: 200
    timeout: 10000
    allow-insecure: true
    headers:
      - "Content-Type: application/json"

file:
  /etc/emby-server.conf:
    exists: true
    contains:
      - "EMBY_DATA=/config"
  /config:
    exists: true
    filetype: directory
    owner: "emby"
    group: "emby"
